name: CI - Quality Checks

# Opción A: Vercel gestiona los despliegues (integración Git nativa).
# Este workflow solo valida calidad en cada push y PR a main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build (verificación)
        run: npm run build
        # Valores placeholder (NO secretos): el build de CI solo verifica que el
        # proyecto compila. El deploy real lo hace Vercel con las variables reales.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build-only
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-for-ci-build-only
